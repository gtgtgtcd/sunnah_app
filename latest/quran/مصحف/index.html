<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Pro - النسخة الاحترافية الكاملة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <style>
        :root {
            --bg-deep: #1a1a1a;
            --sidebar-bg: #0f0f0f;
            --accent: #4ff0b7;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --page-bg: #fffbf2;
            --glass: rgba(20, 20, 20, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: var(--accent) var(--sidebar-bg); }

        body {
            background-color: var(--bg-deep);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: radial-gradient(#2a2a2a 1px, transparent 1px);
            background-size: 20px 20px;
            direction: rtl;
            transition: all 0.5s ease;
        }

        /* ================= الشريط العلوي (وضع التركيز) ================= */
        .top-nav-overlay {
            position: fixed; top: -100px; left: 0; right: 0;
            height: 70px;
            background: var(--glass);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            z-index: 200;
            display: flex; align-items: center; padding: 0 20px;
            transition: top 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* يظهر فقط عند تفعيل الكلاس focus-mode */
        body.focus-mode .top-nav-overlay { top: 0; }

        .search-box-container { position: relative; width: 260px; margin-left: 20px; }
        .search-input {
            width: 100%; padding: 10px 40px 10px 15px;
            border-radius: 25px; border: 1px solid #444;
            background: rgba(255,255,255,0.05); color: #fff;
            font-family: 'Outfit', 'Amiri', sans-serif; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent); outline: none; background: rgba(0,0,0,0.3); }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #888; }

        .top-surah-scroll {
            flex: 1; display: flex; overflow-x: auto; gap: 8px;
            align-items: center; height: 100%;
            scrollbar-width: none; 
        }
        .top-surah-scroll::-webkit-scrollbar { display: none; }

        .top-surah-chip {
            background: rgba(255,255,255,0.05); padding: 6px 16px;
            border-radius: 20px; white-space: nowrap; cursor: pointer;
            font-family: 'Amiri', serif; border: 1px solid transparent;
            color: #ccc; transition: 0.2s; font-size: 14px;
        }
        .top-surah-chip:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .top-surah-chip.active { background: rgba(79, 240, 183, 0.15); border-color: var(--accent); color: var(--accent); }

        /* ================= القائمة الجانبية ================= */
        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-left: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 100;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            flex-shrink: 0;
            transition: transform 0.4s ease, width 0.4s ease;
        }
        
        /* اختفاء القائمة في وضع التركيز */
        body.focus-mode .sidebar { transform: translateX(320px); width: 0; border: none; }

        .sidebar-header { padding: 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); }
        .logo { font-size: 20px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--accent); }
        
        .surah-list { flex: 1; overflow-y: auto; padding: 10px; }
        .surah-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 15px; margin-bottom: 5px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .surah-item:hover { background: rgba(255,255,255,0.05); }
        .surah-item.active { background: rgba(79, 240, 183, 0.1); border-color: var(--accent); }
        .surah-num {
            width: 30px; height: 30px; background: #222; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: var(--accent); font-weight: bold; margin-left: 10px;
        }
        .surah-name { font-family: 'Amiri', serif; font-size: 18px; flex: 1; }
        .page-badge { font-size: 11px; color: #888; background: #222; padding: 2px 6px; border-radius: 4px; }

        /* ================= المحتوى الرئيسي ================= */
        .main-content {
            flex: 1;
            display: grid; place-items: center; /* عشان السكرول يشتغل صح */
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            overflow: auto; /* السماح بالسكرول */
            position: relative;
            transition: all 0.3s;
        }

        .zoom-wrapper {
            transition: zoom 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex; 
            justify-content: center; 
            align-items: center;
            
            /* 🔥 التعديل الجوهري: تثبيت أبعاد الحاوية لتطابق الكتاب تماماً 🔥 */
            width: 860px !important; 
            height: 640px !important;
            margin: auto;
            
            /* منع أي تأثيرات جانبية للرسم */
            backface-visibility: hidden;
            transform: translateZ(0); 
        }

        .quran-book-frame {
            position: relative;
            background-color: #2e1e11;
            background-image: url("https://www.transparenttextures.com/patterns/leather.png");
            width: 860px; 
            height: 640px;
            padding: 20px; 
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 2px #d4af37, inset 0 0 0 5px #2e1e11, inset 0 0 0 7px #d4af37;
            display: flex; justify-content: center; align-items: center;
            
            /* خدعة المراية */
            direction: ltr !important; 
            transform: scaleX(-1);
            
            /* 🔥 تثبيت إضافي لمنع الارتعاش أثناء الأنيميشن 🔥 */
            will-change: transform; 
        }
        .quran-book-frame::after {
            content: ''; position: absolute;
            top: 20px; bottom: 20px; left: 50%; width: 20px; margin-left: -10px;
            background: linear-gradient(to right, rgba(0,0,0,0.3), transparent 40%, transparent 60%, rgba(0,0,0,0.3));
            z-index: 5; pointer-events: none;
        }

        /* ================= الصفحات ================= */
        .my-page {
            background-color: var(--page-bg);
            overflow: hidden;
            border: 1px solid #e3d2b4;
            box-shadow: inset 10px 0 20px rgba(0,0,0,0.05);
        }

        .page-content-wrapper {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; padding: 20px 15px; /* حواف أمان */
            transform: scaleX(-1); /* عدل المحتوى */
        }

        .page-header {
            position: relative; width: 80%; height: 35px; margin: 0 auto;
            border: 1px solid #d4af37; border-radius: 4px;
            background: rgba(255, 255, 255, 0.4);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .header-text { font-family: 'Amiri', serif; font-weight: bold; color: #2e1e11; font-size: 14px; }
        
        /* تحسين عرض الصورة */
        .mushaf-page-img { 
            flex: 1; width: 100%; object-fit: contain; 
            mix-blend-mode: multiply; margin: 10px 0; min-height: 0; 
        }
        
        .page-footer { position: relative; width: 100%; height: 25px; text-align: center; flex-shrink: 0; }
        .page-num-text { font-family: 'Amiri', serif; font-size: 14px; color: #2e1e11; font-weight: bold; }

        /* ================= أزرار التنقل الجانبية ================= */
        .nav-btn {
            position: fixed; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.6); color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 20; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--accent); color: black; }
        
        .next-btn { left: 20px; right: auto; } 
        .prev-btn { right: 340px; left: auto; } /* بعيدة عن السايدبار */

        @media (max-width: 900px) { .prev-btn { right: 20px; } }

        /* 🔥 إخفاء أزرار الجناب في وضع التركيز 🔥 */
        body.focus-mode .nav-btn { opacity: 0; pointer-events: none; }

        /* ================= شريط الأدوات السفلي ================= */
        .reading-tools-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 200; direction: ltr;
            transition: all 0.3s;
        }
        .tools-bar {
            display: flex; align-items: center; gap: 10px;
            background: var(--glass);
            padding: 10px 20px; border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .tool-btn {
            background: transparent; border: none; color: #ccc;
            font-size: 18px; cursor: pointer; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .tool-btn:hover { background: rgba(212, 175, 55, 0.2); color: #d4af37; transform: translateY(-3px); }
        .divider { width: 1px; height: 25px; background: rgba(255,255,255,0.1); margin: 0 5px; }
        
        /* أزرار التنقل المدمجة (تظهر فقط في وضع التركيز) */
        .focus-nav-btn { display: none; background: rgba(255,255,255,0.1); color: #fff; }
        .focus-nav-btn:hover { background: var(--accent); color: #000; }
        body.focus-mode .focus-nav-btn { display: flex; }

        body.night-mode .my-page { background-color: #222 !important; border-color: #444 !important; }
        body.night-mode .header-text, body.night-mode .page-num-text { color: #d4af37 !important; }
        body.night-mode .page-header { background: rgba(0,0,0,0.5) !important; border-color: #d4af37 !important; }
        body.night-mode .mushaf-page-img { filter: invert(1) hue-rotate(180deg) brightness(1.2); mix-blend-mode: screen !important; }

        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--accent); font-size: 20px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

    <div class="top-nav-overlay">
        <div class="logo" style="font-size: 16px;"><i class="fas fa-book-open"></i></div>
        
        <div class="search-box-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="surahSearch" placeholder="ابحث عن سورة..." onkeyup="searchSurah()">
        </div>

        <div class="top-surah-scroll" id="topSurahContainer">
            </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-quran"></i> Quran Pro</div>
        </div>
        <div class="surah-list" id="surahContainer"></div>
    </div>

    <div class="main-content">
        <button class="nav-btn next-btn" onclick="flipNextVisually()" title="الصفحة التالية"><i class="fas fa-chevron-left"></i></button>
        
        <div id="loader"><i class="fas fa-circle-notch fa-spin"></i> جاري تحميل المصحف...</div>

        <div class="zoom-wrapper" id="zoomTarget">
            <div class="quran-book-frame">
                <div id="flip-book"></div>
            </div>
        </div>

        <button class="nav-btn prev-btn" onclick="flipPrevVisually()" title="الصفحة السابقة"><i class="fas fa-chevron-right"></i></button>
    </div>

    <div class="reading-tools-container">
        <div class="tools-bar">
            <button class="tool-btn focus-nav-btn" onclick="flipNextVisually()" title="التالي"><i class="fas fa-chevron-left"></i></button>
            
            <button class="tool-btn" onclick="toggleNightMode()" title="الوضع الليلي"><i class="fas fa-moon" id="nightIcon"></i></button>
            <div class="divider"></div>
            
            <button class="tool-btn" onclick="zoomOut()" title="تصغير"><i class="fas fa-search-minus"></i></button>
            <span class="zoom-level" id="zoomDisplay">100%</span>
            <button class="tool-btn" onclick="zoomIn()" title="تكبير"><i class="fas fa-search-plus"></i></button>
            
            <div class="divider"></div>
            <button class="tool-btn" onclick="toggleFocusMode()" title="وضع التركيز"><i class="fas fa-expand"></i></button>

            <button class="tool-btn focus-nav-btn" onclick="flipPrevVisually()" title="السابق"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <audio id="flipSound" src="https://www.soundjay.com/books/sounds/book-page-turn-01.mp3"></audio>

    <script>
        // =====================================================
        // 1. توليد بيانات السور (الـ 114 سورة) - تم التعديل إلى بيانات دقيقة
        // =====================================================
        const surahNames = [
            "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس",
            "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه",
            "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم",
            "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر",
            "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق",
            "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة",
            "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج",
            "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس",
            "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد",
            "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات",
            "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر",
            "المسد", "الإخلاص", "الفلق", "الناس"
        ];
        
        // 🔥🔥 البيانات الدقيقة لصفحات البداية لكل سورة (Madinah Mushaf) 🔥🔥
        const startingPageMap = [
            1, 2, 50, 77, 106, 128, 151, 177, 187, 208, 
            221, 235, 249, 255, 262, 267, 282, 293, 305, 312, 
            322, 332, 342, 350, 359, 367, 377, 385, 396, 404, 
            411, 415, 418, 428, 434, 440, 446, 453, 458, 467, 
            477, 483, 489, 496, 499, 502, 507, 511, 515, 518, 
            520, 523, 526, 528, 531, 534, 537, 542, 545, 551, 
            554, 556, 559, 560, 563, 564, 566, 568, 570, 572, 
            574, 576, 578, 581, 582, 584, 586, 587, 590, 591, 
            592, 593, 594, 595, 597, 598, 599, 600, 601, 602, 
            603, 604, 604, 604, 604, 604, 604, 604, 604, 604, 
            604, 604, 604, 604, 604, 604, 604, 604, 604, 604, 
            604, 604, 604, 604
        ]; /* 114 قيمة */
        
        const totalPages = 604;

        // توليد بيانات السور باستخدام المصفوفة الدقيقة
        const surahData = surahNames.map((name, index) => ({
            id: index + 1,
            name: name,
            page: startingPageMap[index] || 1 // استخدام البيانات الثابتة
        }));
        // تصحيح: إضافة صفحة نهاية المصحف لآخر سورة
        surahData[surahData.length - 1].page = 604;

        function getSurahName(page) {
            let current = surahData[0];
            for (let s of surahData) { if (page >= s.page) current = s; }
            return "سورة " + current.name;
        }
        function toArabicNumerals(num) { return num.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]); }

        // =====================================================
        // 2. التحميل الذكي للصفحات (Lazy Loading Pages)
        // =====================================================
        const bookEl = document.getElementById('flip-book');
        let htmlContent = '';
        
        // هنا بنبني الهيكل بس، من غير ما نحط رابط الصورة في الـ src
        // بنحطه في data-src عشان المتصفح ميحملوش
        for (let i = 1; i <= totalPages; i++) {
            const formattedNum = String(i).padStart(3, '0');
            const surahName = getSurahName(i);
            const arabicNum = toArabicNumerals(i);
            const realImageSrc = `https://www.mp3quran.net/api/quran_pages_svg/${formattedNum}.svg`;
            
            htmlContent += `
            <div class="my-page" id="page-${i}" data-density="soft">
                <div class="page-content-wrapper">
                    <div class="page-header"><span class="header-text">${surahName}</span></div>
                    
                    <img src="" 
                         data-src="${realImageSrc}" 
                         class="mushaf-page-img" 
                         loading="lazy" 
                         draggable="false" 
                         alt="page ${i}">
                         
                    <div class="page-footer"><span class="page-num-text">${arabicNum}</span></div>
                </div>
            </div>`;
        }
        bookEl.innerHTML = htmlContent;

        // دالة إدارة الذاكرة (الأهم على الإطلاق)
        // بتحمل صور الصفحات اللي المستخدم فاتحها بس، وتمسح الباقي
        function manageMemory(currentIndex) {
            // النطاق: الصفحة الحالية + 2 قبلها + 2 بعدها (Buffer)
            const start = Math.max(1, currentIndex - 2);
            const end = Math.min(totalPages, currentIndex + 3);
            
            // 1. تحميل الصور اللي في النطاق
            for (let i = start; i <= end; i++) {
                const img = document.querySelector(`#page-${i} .mushaf-page-img`);
                if (img && !img.getAttribute('src')) {
                    img.setAttribute('src', img.getAttribute('data-src'));
                }
            }

            // 2. تنظيف الذاكرة (مسح الصور البعيدة)
            // بنمسح أي صورة بره النطاق ده عشان الرامات ترتاح
            const loadedImages = document.querySelectorAll('.mushaf-page-img[src]:not([src=""])');
            loadedImages.forEach(img => {
                const pageNum = parseInt(img.alt.replace('page ', ''));
                if (pageNum < start || pageNum > end) {
                    img.setAttribute('src', ''); // تفريغ الصورة
                }
            });
        }

        // =====================================================
        // 3. إعداد الكتاب والمكتبة
        // =====================================================
        let pageFlip;
        document.addEventListener('DOMContentLoaded', () => {
            const isMobile = window.innerWidth < 900;
            // أبعاد الكتاب
            const pageWidth = isMobile ? window.innerWidth * 0.85 : 410;
            const pageHeight = isMobile ? window.innerHeight * 0.7 : 600;

            pageFlip = new St.PageFlip(bookEl, {
                width: pageWidth, height: pageHeight, size: isMobile ? 'fixed' : 'stretch',
                direction: 'ltr', useMouseEvents: false, // منع السحب
                minWidth: 300, maxWidth: 500, minHeight: 400, maxHeight: 800,
                showCover: false, usePortrait: isMobile, maxShadowOpacity: 0.3
            });

            pageFlip.loadFromHTML(document.querySelectorAll('.my-page'));
            
            // تحميل أول صفحتين فوراً
            manageMemory(1);
            document.getElementById('loader').style.display = 'none';

            // عند كل تقليب، شغل دالة إدارة الذاكرة
            pageFlip.on('flip', (e) => { 
                playSound(); 
                highlightSidebar(e.data + 1);
                manageMemory(e.data + 1); // 🔥 هنا السحر بيحصل
            });
            
            initSidebarLazyLoad(); // تشغيل القائمة الذكية
            buildTopBar(surahData);
        });

        const sound = document.getElementById('flipSound');
        function playSound() { sound.currentTime = 0; sound.play().catch(() => {}); }

        // دوال التنقل المعدلة للعربي
        function flipNextVisually() { pageFlip.flipNext(); }
        function flipPrevVisually() { pageFlip.flipPrev(); }
        function goToPage(pageNum) { pageFlip.flip(pageNum - 1); }

        // =====================================================
        // 4. القائمة الجانبية الذكية (Infinite Scroll)
        // =====================================================
        let renderedSurahs = 0;
        const batchSize = 20; // عدد السور في كل دفعة

        function renderSidebarBatch() {
            const container = document.getElementById('surahContainer');
            const total = surahData.length;
            const limit = Math.min(renderedSurahs + batchSize, total);

            for (let i = renderedSurahs; i < limit; i++) {
                const surah = surahData[i];
                const div = document.createElement('div');
                div.className = 'surah-item';
                div.id = `surah-link-${surah.page}`;
                div.onclick = function() { goToPage(surah.page); };
                div.innerHTML = `
                    <div class="surah-num">${surah.id}</div>
                    <div class="surah-name">${surah.name}</div>
                    <span class="page-badge">ص ${surah.page}</span>`;
                container.appendChild(div);
            }
            renderedSurahs = limit;
        }

        function initSidebarLazyLoad() {
            // تحميل أول دفعة
            renderSidebarBatch();
            
            // مراقب السكرول (لما توصل لآخر القائمة حمل الباقي)
            const container = document.getElementById('surahContainer');
            container.addEventListener('scroll', () => {
                if (container.scrollTop + container.clientHeight >= container.scrollHeight - 50) {
                    if (renderedSurahs < surahData.length) {
                        renderSidebarBatch();
                    }
                }
            });
        }

        function buildTopBar(data) {
            const container = document.getElementById('topSurahContainer');
            container.innerHTML = '';
            data.forEach(surah => {
                const chip = document.createElement('div');
                chip.className = 'top-surah-chip';
                chip.id = `top-surah-${surah.page}`;
                chip.innerText = `${surah.id}. ${surah.name}`;
                chip.onclick = function() { goToPage(surah.page); };
                container.appendChild(chip);
            });
        }

        // البحث (Normalizer)
        function normalizeArabic(text) {
            return text.replace(/(آ|إ|أ)/g, 'ا').replace(/ة/g, 'ه').replace(/ئ/g, 'ي').replace(/ى/g, 'ي');
        }
        function searchSurah() {
            const query = normalizeArabic(document.getElementById('surahSearch').value);
            if (!query) { buildTopBar(surahData); return; }
            const results = surahData.filter(surah => normalizeArabic(surah.name).includes(query));
            buildTopBar(results);
        }

        function highlightSidebar(currentPage) {
            document.querySelectorAll('.surah-item, .top-surah-chip').forEach(el => el.classList.remove('active'));
            let targetPage = 1;
            for (let s of surahData) { if (currentPage >= s.page) targetPage = s.page; }
            
            const el = document.getElementById(`surah-link-${targetPage}`);
            if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            
            const topEl = document.getElementById(`top-surah-${targetPage}`);
            if (topEl) { topEl.classList.add('active'); topEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
        }

        // =====================================================
        // 5. الزوم ووضع التركيز
        // =====================================================
        let currentZoom = 1;
        let savedZoom = 1;
        const zoomStep = 0.1;
        const maxZoom = 3.0;
        const minZoom = 0.5;

        function applyZoom() {
            document.getElementById('zoomTarget').style.zoom = currentZoom;
            document.getElementById('zoomDisplay').innerText = Math.round(currentZoom * 100) + '%';
        }
        function zoomIn() { if (currentZoom < maxZoom) { currentZoom += zoomStep; applyZoom(); } }
        function zoomOut() { if (currentZoom > minZoom) { currentZoom -= zoomStep; applyZoom(); } }
        
        // زوم بكرة الماوس
        window.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault();
                if (e.deltaY < 0) zoomIn(); else zoomOut();
            }
        }, { passive: false });

        // زوم اللمس (Pinch)
        const mainContainer = document.querySelector('.main-content');
        let initialPinchDistance = null; let startZoomLevel = 1;
        function getDistance(touches) { return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY); }
        mainContainer.addEventListener('touchstart', (e) => { if (e.touches.length === 2) { initialPinchDistance = getDistance(e.touches); startZoomLevel = currentZoom; } });
        mainContainer.addEventListener('touchmove', (e) => { if (e.touches.length === 2) { e.preventDefault(); const currentDistance = getDistance(e.touches); if (initialPinchDistance) { const pinchRatio = currentDistance / initialPinchDistance; let newZoom = startZoomLevel * pinchRatio; if (newZoom > maxZoom) newZoom = maxZoom; if (newZoom < minZoom) newZoom = minZoom; currentZoom = newZoom; applyZoom(); } } }, { passive: false });
        mainContainer.addEventListener('touchend', () => { initialPinchDistance = null; });

        // تبديل وضع التركيز
        function toggleFocusMode() {
            const body = document.body;
            
            if (!document.fullscreenElement) {
                // 1. دخول ملء الشاشة
                document.documentElement.requestFullscreen().catch(err => {});
                body.classList.add('focus-mode');
                
                // 2. حفظ الزوم القديم
                savedZoom = currentZoom;
                
                // 🔥 التعديل هنا: النسبة بقت 120% (1.2) 🔥
                currentZoom = 1.2; 
                applyZoom();
                
            } else {
                // الخروج
                if (document.exitFullscreen) document.exitFullscreen();
                body.classList.remove('focus-mode');
                
                // استرجاع الزوم الطبيعي
                currentZoom = savedZoom;
                applyZoom();
            }
        }
        
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.body.classList.remove('focus-mode');
                currentZoom = 1; applyZoom();
            }
        });

        // =====================================================
        // 6. التحكم والوضع الليلي
        // =====================================================
        let isNightMode = false;
        function toggleNightMode() {
            isNightMode = !isNightMode;
            document.body.classList.toggle('night-mode');
            const icon = document.getElementById('nightIcon');
            if (isNightMode) { icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); }
            else { icon.classList.remove('fa-sun'); icon.classList.add('fa-moon'); }
        }
        
        // التحكم بالكيبورد
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowRight') flipPrevVisually(); // سهم يمين = سابق
            else if (e.code === 'ArrowLeft') flipNextVisually(); // سهم شمال = تالي
        });

        // التحكم بالماوس (يمين وشمال الصفحة)
        pageFlip.on('init', () => {
            const pages = document.querySelectorAll('.my-page');
            pages.forEach((page) => {
                page.addEventListener('click', (e) => {
                    const screenMiddle = window.innerWidth / 2;
                    // شمال الشاشة = تالي
                    if (e.clientX < screenMiddle) flipNextVisually();
                    // يمين الشاشة = سابق
                    else flipPrevVisually();
                });
            });
        });
    </script>
</body>
</html>
