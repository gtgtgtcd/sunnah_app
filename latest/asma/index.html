<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <script>
        // كود الطوارئ المُحسَّن: يضيف الشرطة / بس يحافظ على الـ parameters
        (function () {
            // استثناء 1: لو فاتح من ملف مباشر (file://)
            if (window.location.protocol === 'file:') return;

            // استثناء 2: لو الرابط فيه parameters (?surah=20)
            if (window.location.search) return;

            // استثناء 3: لو الرابط أصلاً فيه شرطة في الآخر
            if (window.location.href.endsWith('/')) return;

            // استثناء 4: لو الرابط فيه اسم ملف (.html, .php, etc)
            if (window.location.pathname.split('/').pop().includes('.')) return;

            // لو وصلنا هنا، يبقى محتاجين نضيف الشرطة
            window.location.href = window.location.href + '/';
        })();
    </script>
